<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Atom Bios — LNP Drug Delivery System</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  background: #1a1a2e; color: #fff; overflow: hidden;
  touch-action: none;
}
#canvas-container { width: 100vw; height: 100vh; position: relative; }
canvas { display: block; }

/* Top bar */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 20px 24px; z-index: 100;
  background: linear-gradient(to bottom, rgba(26,26,46,0.95), transparent);
}
.top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
.top-bar p { font-size: 12px; color: #999; margin-top: 4px; }

/* Scale indicator */
.scale-panel {
  position: fixed; bottom: 110px; left: 24px; right: 24px;
  z-index: 100; text-align: center;
}
.scale-label {
  font-size: 14px; color: #ccc; margin-bottom: 8px;
  transition: all 0.3s;
}
.scale-value {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, #00d4ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  transition: all 0.3s;
}
.scale-ratio {
  font-size: 13px; color: #888; margin-top: 4px;
  transition: all 0.3s;
}

/* Comparison cards */
.comparison-bar {
  position: fixed; bottom: 24px; left: 0; right: 0;
  display: flex; gap: 8px; padding: 0 16px;
  overflow-x: auto; z-index: 100;
  -webkit-overflow-scrolling: touch;
}
.comp-card {
  flex-shrink: 0;
  padding: 10px 16px; border-radius: 12px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: all 0.2s;
  text-align: center; min-width: 100px;
}
.comp-card.active {
  background: rgba(0,212,255,0.15);
  border-color: #00d4ff;
}
.comp-card .emoji { font-size: 20px; }
.comp-card .name { font-size: 11px; color: #aaa; margin-top: 4px; }
.comp-card .size { font-size: 10px; color: #666; margin-top: 2px; }

/* Info overlay */
.info-panel {
  position: fixed; top: 80px; right: 20px;
  padding: 16px; border-radius: 12px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: 100; max-width: 220px;
  opacity: 0; transition: opacity 0.3s;
}
.info-panel.visible { opacity: 1; }
.info-panel h3 { font-size: 13px; color: #00d4ff; margin-bottom: 6px; }
.info-panel p { font-size: 11px; color: #aaa; line-height: 1.5; }

/* Loading */
.loader {
  position: fixed; inset: 0; display: flex;
  align-items: center; justify-content: center;
  background: #1a1a2e; z-index: 1000;
  flex-direction: column; gap: 16px;
  transition: opacity 0.5s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.loader-ring {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid rgba(0,212,255,0.2);
  border-top-color: #00d4ff;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader p { font-size: 13px; color: #888; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <p>Loading 3D Model...</p>
</div>

<div class="top-bar">
  <h1>Atom Bios — LNP Drug Delivery</h1>
  <p>Pinch to zoom · Drag to rotate · Tap items to compare scale</p>
</div>

<div class="info-panel" id="info-panel">
  <h3 id="info-title"></h3>
  <p id="info-text"></p>
</div>

<div class="scale-panel">
  <div class="scale-label" id="scale-label">Our Lipid Nanoparticle</div>
  <div class="scale-value" id="scale-value">~20 nm</div>
  <div class="scale-ratio" id="scale-ratio"></div>
</div>

<div class="comparison-bar" id="comparison-bar">
  <div class="comp-card active" data-id="lnp">
    <div class="emoji">💊</div>
    <div class="name">Our LNP</div>
    <div class="size">20 nm</div>
  </div>
  <div class="comp-card" data-id="virus">
    <div class="emoji">🦠</div>
    <div class="name">Virus</div>
    <div class="size">100 nm</div>
  </div>
  <div class="comp-card" data-id="rbc">
    <div class="emoji">🔴</div>
    <div class="name">Red Blood Cell</div>
    <div class="size">7,000 nm</div>
  </div>
  <div class="comp-card" data-id="hair">
    <div class="emoji">〰️</div>
    <div class="name">Human Hair</div>
    <div class="size">80,000 nm</div>
  </div>
  <div class="comp-card" data-id="sand">
    <div class="emoji">⏳</div>
    <div class="name">Grain of Sand</div>
    <div class="size">500,000 nm</div>
  </div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 2000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Subtle gradient fog
scene.fog = new THREE.Fog(0x1a1a2e, 15, 60);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
fillLight.position.set(-5, -3, -5);
scene.add(fillLight);
const rimLight = new THREE.PointLight(0x00d4ff, 0.5, 20);
rimLight.position.set(0, 5, -5);
scene.add(rimLight);

// Grid helper for depth perception
const grid = new THREE.GridHelper(30, 30, 0x333355, 0x222244);
grid.position.y = -2;
scene.add(grid);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.5;
controls.enablePan = true;
controls.maxDistance = 50;
controls.minDistance = 1;

// Scale data
const comparisons = {
  lnp:   { size: 20,     color: 0x00d4ff, label: 'Our Lipid Nanoparticle', ratio: '' },
  virus: { size: 100,    color: 0x66ff88, label: 'Typical Virus (e.g. SARS-CoV-2)', ratio: '5× larger than our LNP' },
  rbc:   { size: 7000,   color: 0xff5555, label: 'Red Blood Cell', ratio: '350× larger than our LNP' },
  hair:  { size: 80000,  color: 0xffbb44, label: 'Human Hair (cross-section)', ratio: '4,000× larger than our LNP' },
  sand:  { size: 500000, color: 0xffdd88, label: 'Grain of Sand', ratio: '25,000× larger than our LNP' }
};

const infoData = {
  lnp:   'Our nanoparticle at ~20 nm. Small enough to cross the blood-brain barrier and deliver drugs directly into cells.',
  virus: 'A typical virus like SARS-CoV-2 is ~100 nm. Our LNP is 5× smaller, enabling it to evade immune detection more effectively.',
  rbc:   'A red blood cell is ~7,000 nm (7 µm). Our nanoparticle is 350× smaller — it flows freely through the smallest capillaries without blockage.',
  hair:  'A human hair is ~80,000 nm (80 µm) wide. You could line up 4,000 of our nanoparticles across a single strand.',
  sand:  'A grain of sand is ~500,000 nm (0.5 mm). Our LNP is 25,000× smaller — completely invisible to the naked eye.'
};

let lnpModel = null;
let lnpBaseScale = 1;
let compGroup = new THREE.Group();
scene.add(compGroup);

// --- Comparison shape builders ---

function createVirusShape(radius, color) {
  const group = new THREE.Group();
  // Core sphere
  const coreGeom = new THREE.SphereGeometry(radius * 0.75, 32, 32);
  const coreMat = new THREE.MeshPhysicalMaterial({
    color: color, transparent: true, opacity: 0.4,
    roughness: 0.4, metalness: 0.1
  });
  group.add(new THREE.Mesh(coreGeom, coreMat));
  
  // Spike proteins
  const spikeMat = new THREE.MeshPhysicalMaterial({
    color: 0xaaffaa, roughness: 0.5, metalness: 0.2
  });
  const spikeCount = 60;
  for (let i = 0; i < spikeCount; i++) {
    const phi = Math.acos(1 - 2 * (i + 0.5) / spikeCount);
    const theta = Math.PI * (1 + Math.sqrt(5)) * i;
    const x = Math.sin(phi) * Math.cos(theta);
    const y = Math.sin(phi) * Math.sin(theta);
    const z = Math.cos(phi);
    
    // Spike stem
    const stemGeom = new THREE.CylinderGeometry(radius * 0.02, radius * 0.015, radius * 0.3, 6);
    const stem = new THREE.Mesh(stemGeom, spikeMat);
    stem.position.set(x * radius * 0.85, y * radius * 0.85, z * radius * 0.85);
    stem.lookAt(x * radius * 2, y * radius * 2, z * radius * 2);
    stem.rotateX(Math.PI / 2);
    group.add(stem);
    
    // Spike head (bulb)
    const headGeom = new THREE.SphereGeometry(radius * 0.05, 8, 8);
    const head = new THREE.Mesh(headGeom, spikeMat);
    head.position.set(x * radius, y * radius, z * radius);
    group.add(head);
  }
  return group;
}

function createRBCShape(radius, color) {
  const group = new THREE.Group();
  // Biconcave disc using LatheGeometry
  const points = [];
  const segments = 40;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const r = t * radius;
    // Biconcave profile: thick at edges, dimpled in center
    const y = radius * 0.15 * Math.sin(t * Math.PI) * (1 - 0.6 * Math.pow(1 - t, 2));
    points.push(new THREE.Vector2(r, y));
  }
  const latheGeom = new THREE.LatheGeometry(points, 48);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color, transparent: true, opacity: 0.6,
    roughness: 0.3, metalness: 0.0, side: THREE.DoubleSide
  });
  const disc = new THREE.Mesh(latheGeom, mat);
  group.add(disc);
  
  // Also add bottom half (mirror)
  const points2 = points.map(p => new THREE.Vector2(p.x, -p.y));
  const latheGeom2 = new THREE.LatheGeometry(points2, 48);
  const disc2 = new THREE.Mesh(latheGeom2, mat);
  group.add(disc2);
  
  // Tilt slightly for visual interest
  group.rotation.x = 0.3;
  group.rotation.z = 0.2;
  return group;
}

function createHairShape(radius, color) {
  const group = new THREE.Group();
  // Cylinder (hair cross-section, shown as a tube segment)
  const length = radius * 3;
  const cylGeom = new THREE.CylinderGeometry(radius, radius, length, 32, 1, false);
  const mat = new THREE.MeshPhysicalMaterial({
    color: color, transparent: true, opacity: 0.5,
    roughness: 0.6, metalness: 0.0
  });
  const cyl = new THREE.Mesh(cylGeom, mat);
  cyl.rotation.z = Math.PI / 6; // slight tilt
  group.add(cyl);
  
  // Cross-section ring at one end
  const ringGeom = new THREE.RingGeometry(radius * 0.9, radius, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, opacity: 0.8, transparent: true });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.position.y = length / 2;
  ring.rotation.x = Math.PI / 2;
  ring.rotation.z = -Math.PI / 6;
  cyl.add(ring);
  
  return group;
}

function createSandShape(radius, color) {
  const group = new THREE.Group();
  // Irregular rock-like shape using icosahedron with noise
  const geom = new THREE.IcosahedronGeometry(radius, 2);
  const positions = geom.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = positions.getZ(i);
    const noise = 0.75 + Math.random() * 0.5;
    positions.setXYZ(i, x * noise, y * noise, z * noise);
  }
  geom.computeVertexNormals();
  
  const mat = new THREE.MeshPhysicalMaterial({
    color: color, transparent: true, opacity: 0.5,
    roughness: 0.9, metalness: 0.0,
    flatShading: true
  });
  group.add(new THREE.Mesh(geom, mat));
  
  // Subtle edge highlight
  const wireGeom = new THREE.WireframeGeometry(geom);
  const wireMat = new THREE.LineBasicMaterial({ color: color, opacity: 0.15, transparent: true });
  group.add(new THREE.LineSegments(wireGeom, wireMat));
  
  return group;
}

// Factory to pick the right shape
function createCompShape(id, radius, color) {
  switch(id) {
    case 'virus': return createVirusShape(radius, color);
    case 'rbc':   return createRBCShape(radius, color);
    case 'hair':  return createHairShape(radius, color);
    case 'sand':  return createSandShape(radius, color);
    default:      return createVirusShape(radius, color);
  }
}

// Load LNP model
const loader = new GLTFLoader();
loader.load('lipo2.glb', (gltf) => {
  lnpModel = gltf.scene;
  
  const box = new THREE.Box3().setFromObject(lnpModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  lnpBaseScale = 2.5 / maxDim; // LNP sphere radius ~1.25 units = 20nm
  lnpModel.scale.setScalar(lnpBaseScale);
  lnpModel.position.sub(center.multiplyScalar(lnpBaseScale));
  
  scene.add(lnpModel);
  camera.position.set(0, 2, 7);
  controls.target.set(0, 0, 0);
  controls.update();
  
  document.getElementById('loader').classList.add('hidden');
}, undefined, (error) => {
  console.error('Error loading model:', error);
  document.querySelector('.loader p').textContent = 'Error loading model';
});

// UI elements
const cards = document.querySelectorAll('.comp-card');
const infoPanel = document.getElementById('info-panel');
const infoTitle = document.getElementById('info-title');
const infoText = document.getElementById('info-text');
const scaleValue = document.getElementById('scale-value');
const scaleLabel = document.getElementById('scale-label');
const scaleRatio = document.getElementById('scale-ratio');

let currentId = 'lnp';
// The LNP model is scaled so its diameter = 2.5 scene units (radius 1.25)
// LNP real diameter = 20nm, so 1 scene unit = 8nm
const LNP_DIAMETER_UNITS = 2.5;
const LNP_DIAMETER_NM = 20;
const NM_PER_UNIT = LNP_DIAMETER_NM / LNP_DIAMETER_UNITS; // 8nm per unit

function showComparison(id) {
  currentId = id;
  const comp = comparisons[id];
  
  // Update UI
  cards.forEach(c => c.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`).classList.add('active');
  scaleLabel.textContent = comp.label;
  scaleValue.textContent = `~${comp.size.toLocaleString()} nm`;
  scaleRatio.textContent = comp.ratio;
  infoTitle.textContent = comp.label;
  infoText.textContent = infoData[id];
  infoPanel.classList.toggle('visible', id !== 'lnp');
  
  // Clear previous comparison sphere
  while (compGroup.children.length) compGroup.remove(compGroup.children[0]);
  
  // Reset LNP scale
  if (lnpModel) lnpModel.scale.setScalar(lnpBaseScale);
  
  if (id === 'lnp') {
    animateCamera(new THREE.Vector3(0, 2, 7), new THREE.Vector3(0, 0, 0));
    return;
  }
  
  // True scale ratio (diameter)
  const ratio = comp.size / LNP_DIAMETER_NM;
  
  // For small ratios (virus = 5×), show at true scale side by side
  // For large ratios, show comparison sphere at a fixed visual size
  // and shrink the LNP to show how tiny it actually is
  
  let sphereRadius;
  let lnpScale = lnpBaseScale;
  let camDist;
  
  if (ratio <= 10) {
    // True scale — both fit on screen
    // Comparison sphere radius in scene units
    sphereRadius = (comp.size / 2) / NM_PER_UNIT;
    camDist = sphereRadius * 3.5;
  } else {
    // Fixed comparison sphere, shrink LNP proportionally
    // Show comparison sphere at radius 4 units, LNP shrinks
    const fixedCompRadius = 4;
    sphereRadius = fixedCompRadius;
    const shrinkFactor = 1 / ratio;
    lnpScale = lnpBaseScale * (fixedCompRadius / (LNP_DIAMETER_UNITS / 2)) * shrinkFactor;
    if (lnpModel) lnpModel.scale.setScalar(Math.max(lnpScale, lnpBaseScale * 0.01));
    camDist = fixedCompRadius * 3.5;
  }
  
  const shape = createCompShape(id, sphereRadius, comp.color);
  shape.position.set(0, 0, 0);
  compGroup.add(shape);
  
  // Add a small label dot at LNP position for large ratios
  if (ratio > 10) {
    const dotGeom = new THREE.SphereGeometry(0.08, 16, 16);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
    const dot = new THREE.Mesh(dotGeom, dotMat);
    dot.position.set(0, 0, sphereRadius + 0.3);
    compGroup.add(dot);
    
    // Ring around the dot for visibility
    const ringGeom = new THREE.RingGeometry(0.12, 0.16, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.position.copy(dot.position);
    ring.lookAt(camera.position);
    compGroup.add(ring);
  }
  
  animateCamera(
    new THREE.Vector3(0, sphereRadius * 0.4, camDist),
    new THREE.Vector3(0, 0, 0)
  );
}

// Smooth camera animation
let cameraTarget = null;
let controlsTarget = null;
let animProgress = 1;

function animateCamera(newPos, newTarget) {
  cameraTarget = newPos;
  controlsTarget = newTarget;
  animProgress = 0;
}

cards.forEach(card => {
  card.addEventListener('click', () => showComparison(card.dataset.id));
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  // Camera animation
  if (animProgress < 1) {
    animProgress += 0.02;
    const t = Math.min(animProgress, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease in-out
    camera.position.lerp(cameraTarget, ease * 0.05);
    controls.target.lerp(controlsTarget, ease * 0.05);
  }
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Atom Bios — LNP Scale Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  background: #0d1117; color: #fff;
  overflow: hidden; touch-action: none;
  height: 100vh;
}
#canvas { width: 100vw; height: 100vh; display: block; }

.top-bar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 16px 20px; z-index: 100;
  background: linear-gradient(to bottom, rgba(13,17,23,0.95) 60%, transparent);
}
.top-bar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
.top-bar p { font-size: 10px; color: #555; margin-top: 3px; }

/* Info panel */
.info {
  position: fixed; bottom: 96px; left: 0; right: 0;
  text-align: center; z-index: 100;
  pointer-events: none;
  transition: opacity 0.4s;
}
.info .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.info .size {
  font-size: 30px; font-weight: 700;
  background: linear-gradient(135deg, #00d4ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.info .ratio { font-size: 12px; color: #00d4ff; margin-top: 6px; font-weight: 500; }
.info .desc { font-size: 11px; color: #666; margin-top: 6px; max-width: 300px; margin-left: auto; margin-right: auto; line-height: 1.5; }

/* Bottom bar */
.bar {
  position: fixed; bottom: 14px; left: 0; right: 0;
  display: flex; gap: 6px; padding: 0 10px;
  overflow-x: auto; z-index: 100;
  -webkit-overflow-scrolling: touch;
}
.bar::-webkit-scrollbar { display: none; }
.card {
  flex-shrink: 0;
  padding: 8px 12px; border-radius: 10px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.25s;
  text-align: center; min-width: 72px;
}
.card.active { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.5); }
.card .icon { font-size: 16px; }
.card .cname { font-size: 9px; color: #aaa; margin-top: 2px; white-space: nowrap; }
.card .csize { font-size: 8px; color: #555; margin-top: 1px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Atom Bios — LNP Drug Delivery</h1>
  <p>Drag to rotate · Pinch to zoom · Tap items to compare</p>
</div>

<div class="info" id="info">
  <div class="name" id="info-name">Our Lipid Nanoparticle</div>
  <div class="size" id="info-size">~20 nm</div>
  <div class="ratio" id="info-ratio"></div>
  <div class="desc" id="info-desc">Our engineered nanoparticle. Small enough to cross the blood-brain barrier.</div>
</div>

<div class="bar">
  <div class="card active" data-id="lnp"><div class="icon">💊</div><div class="cname">Our LNP</div><div class="csize">20 nm</div></div>
  <div class="card" data-id="liposome"><div class="icon">🫧</div><div class="cname">Doxil®</div><div class="csize">100 nm</div></div>
  <div class="card" data-id="virus"><div class="icon">🦠</div><div class="cname">SARS-CoV-2</div><div class="csize">100 nm</div></div>
  <div class="card" data-id="rbc"><div class="icon">🔴</div><div class="cname">Red Blood Cell</div><div class="csize">7 µm</div></div>
  <div class="card" data-id="hair"><div class="icon">〰️</div><div class="cname">Hair</div><div class="csize">80 µm</div></div>
  <div class="card" data-id="sand"><div class="icon">⏳</div><div class="cname">Sand</div><div class="csize">500 µm</div></div>
</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.001, 2000);
camera.position.set(0, 1, 5);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(4, 8, 6); scene.add(dir);
scene.add(new THREE.DirectionalLight(0x4488ff, 0.2).translateX(-4).translateY(-2));
const rim = new THREE.PointLight(0x00d4ff, 0.4, 20);
rim.position.set(-2, 4, -4); scene.add(rim);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;
controls.enablePan = false;

// --- DATA ---
const items = {
  lnp:      { size: 20,     name: 'Our Lipid Nanoparticle', ratio: '', desc: 'Our engineered nanoparticle. Small enough to cross the blood-brain barrier and deliver drugs directly into cells.' },
  liposome: { size: 100,    name: 'Conventional Liposome (Doxil®)', ratio: '5× larger than our LNP', desc: 'The gold standard in nanomedicine since 1995. PEGylated liposome for cancer therapy. We are 5× smaller than this.' },
  virus:    { size: 100,    name: 'SARS-CoV-2', ratio: '5× larger than our LNP', desc: 'The pandemic virus. Same scale as conventional liposomes. Requires electron microscopy to visualise.' },
  rbc:      { size: 7000,   name: 'Red Blood Cell', ratio: '350× larger than our LNP', desc: 'Our nanoparticle flows through capillaries where these cells barely squeeze through. We pass unnoticed.' },
  hair:     { size: 80000,  name: 'Human Hair (cross-section)', ratio: '4,000× larger than our LNP', desc: '4,000 of our particles could line up across one strand. We operate at a scale invisible to optical microscopy.' },
  sand:     { size: 500000, name: 'Grain of Sand', ratio: '25,000× larger than our LNP', desc: '25,000× smaller than something you can barely see. We exist at the boundary between chemistry and biology.' }
};

// --- MODEL BUILDERS (unit radius ~1) ---
function buildLiposome() {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1,48,48), new THREE.MeshPhysicalMaterial({color:0x4488cc,roughness:0.2,transparent:true,opacity:0.4,clearcoat:0.3})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.82,48,48), new THREE.MeshPhysicalMaterial({color:0x2266aa,roughness:0.3,transparent:true,opacity:0.2,side:THREE.BackSide})));
  const hM = new THREE.MeshStandardMaterial({color:0x88ccff,roughness:0.4});
  for(let i=0;i<200;i++){const phi=Math.acos(1-2*(i+0.5)/200),t=Math.PI*(1+Math.sqrt(5))*i;const h=new THREE.Mesh(new THREE.SphereGeometry(0.03,5,5),hM);h.position.setFromSphericalCoords(1.02,phi,t);g.add(h);}
  const pM = new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.4});
  for(let i=0;i<40;i++){const phi=Math.acos(1-2*(i+0.5)/40),t=Math.PI*(1+Math.sqrt(5))*i;const p=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,0.18,4),pM);const pos=new THREE.Vector3().setFromSphericalCoords(1.11,phi,t);p.position.copy(pos);p.lookAt(0,0,0);p.rotateX(Math.PI/2);g.add(p);const tip=new THREE.Mesh(new THREE.SphereGeometry(0.02,4,4),pM);tip.position.copy(new THREE.Vector3().setFromSphericalCoords(1.2,phi,t));g.add(tip);}
  const cM=new THREE.MeshStandardMaterial({color:0xff5533,emissive:0xff2200,emissiveIntensity:0.3});
  for(let i=0;i<18;i++){const c=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),cM);c.position.set((Math.random()-0.5)*1.2,(Math.random()-0.5)*1.2,(Math.random()-0.5)*1.2);if(c.position.length()<0.7)g.add(c);}
  return g;
}

function buildVirus() {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.8,48,48), new THREE.MeshPhysicalMaterial({color:0x337744,roughness:0.4,clearcoat:0.2})));
  const bM=new THREE.MeshStandardMaterial({color:0x448855,roughness:0.5});
  for(let i=0;i<80;i++){const phi=Math.acos(1-2*(i+0.5)/80),t=Math.PI*(1+Math.sqrt(5))*i;const b=new THREE.Mesh(new THREE.SphereGeometry(0.035,5,5),bM);b.position.setFromSphericalCoords(0.82,phi,t);g.add(b);}
  const sM=new THREE.MeshStandardMaterial({color:0x66cc77,roughness:0.4}),tM=new THREE.MeshStandardMaterial({color:0x99ffaa,roughness:0.3});
  for(let i=0;i<35;i++){const phi=Math.acos(1-2*(i+0.5)/35),t=Math.PI*(1+Math.sqrt(5))*i;const d=new THREE.Vector3().setFromSphericalCoords(1,phi,t).normalize();
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.015,0.3,6),sM);stem.position.copy(d.clone().multiplyScalar(0.95));stem.lookAt(d.clone().multiplyScalar(2));stem.rotateX(Math.PI/2);g.add(stem);
    const hp=d.clone().multiplyScalar(1.15);for(let j=0;j<3;j++){const l=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),tM);const a=(j/3)*Math.PI*2;l.position.copy(hp).add(new THREE.Vector3(Math.cos(a)*0.03,Math.sin(a)*0.03,0));g.add(l);}}
  const curve=new THREE.CatmullRomCurve3([new THREE.Vector3(-0.3,-0.2,0),new THREE.Vector3(0,0.25,0.2),new THREE.Vector3(0.25,-0.15,-0.15),new THREE.Vector3(-0.15,0.1,-0.25),new THREE.Vector3(0.1,-0.1,0.15)],true);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(curve,50,0.02,8,true),new THREE.MeshBasicMaterial({color:0xffcc44,transparent:true,opacity:0.35})));
  return g;
}

function buildRBC() {
  const g = new THREE.Group();
  const S=64,R=32,v=[],idx=[];
  for(let j=0;j<=R;j++){const r=(j/R)*1.2;for(let i=0;i<=S;i++){const t=(i/S)*Math.PI*2;const rN=r/1.2;const y=0.3*(rN*rN-1)*(rN*rN-0.4);v.push(Math.cos(t)*r,y,Math.sin(t)*r);}}
  for(let j=0;j<R;j++)for(let i=0;i<S;i++){const a=j*(S+1)+i,b=a+1,c=a+S+1,d=c+1;idx.push(a,c,b,b,c,d);}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(v,3));geo.setIndex(idx);geo.computeVertexNormals();
  const mat=new THREE.MeshPhysicalMaterial({color:0xcc2222,roughness:0.3,clearcoat:0.4,side:THREE.DoubleSide});
  g.add(new THREE.Mesh(geo,mat));const m2=new THREE.Mesh(geo,mat);m2.scale.y=-1;g.add(m2);
  g.rotation.x=0.3;
  return g;
}

function buildHair() {
  const g = new THREE.Group();
  for(let i=0;i<5;i++){const r=new THREE.Mesh(new THREE.TorusGeometry(1-i*0.03,0.025,8,48),new THREE.MeshStandardMaterial({color:0x8b6914,roughness:0.6,transparent:true,opacity:0.7-i*0.1}));r.rotation.x=Math.PI/2;g.add(r);}
  const cx=new THREE.Mesh(new THREE.CylinderGeometry(0.82,0.82,0.3,48),new THREE.MeshStandardMaterial({color:0xa07818,roughness:0.5}));cx.rotation.x=Math.PI/2;g.add(cx);
  for(let i=0;i<30;i++){const a=(i/30)*Math.PI*2,r=0.3+Math.random()*0.4;const f=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.32,4),new THREE.MeshStandardMaterial({color:0x7a5818}));f.position.set(Math.cos(a)*r,0,Math.sin(a)*r);f.rotation.x=Math.PI/2;g.add(f);}
  const md=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.35,16),new THREE.MeshStandardMaterial({color:0x4a3008,roughness:0.8}));md.rotation.x=Math.PI/2;g.add(md);
  return g;
}

function buildSand() {
  const g = new THREE.Group();
  const geo=new THREE.IcosahedronGeometry(1,3);const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);const n=0.75+0.5*(Math.sin(x*5.1+y*3.7)*Math.cos(z*4.3+x*2.9)*0.5+0.5);pos.setXYZ(i,x*n,y*n,z*n);}
  geo.computeVertexNormals();
  g.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0xc9a84c,roughness:0.85,flatShading:true})));
  for(let i=0;i<20;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(0.05,5,5),new THREE.MeshStandardMaterial({color:0x8a6b20,roughness:1}));p.position.setFromSphericalCoords(1.0,Math.random()*Math.PI,Math.random()*Math.PI*2);g.add(p);}
  return g;
}

// --- SCENE MANAGEMENT ---
// LNP is always centered at a fixed visual size (the anchor)
const LNP_VISUAL_RADIUS = 1.0; // scene units — LNP always this size
const compGroup = new THREE.Group();
scene.add(compGroup);
const lnpGroup = new THREE.Group();
scene.add(lnpGroup);

// Pre-build comparison models
const compModels = {
  liposome: buildLiposome(),
  virus: buildVirus(),
  rbc: buildRBC(),
  hair: buildHair(),
  sand: buildSand()
};

// Load LNP
let lnpModel = null;
new GLTFLoader().load('lipo2.glb', (gltf) => {
  lnpModel = gltf.scene;
  const box = new THREE.Box3().setFromObject(lnpModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const s = (LNP_VISUAL_RADIUS * 2) / Math.max(size.x, size.y, size.z);
  lnpModel.scale.setScalar(s);
  lnpModel.position.sub(center.multiplyScalar(s));
  lnpGroup.add(lnpModel);
});

// --- CAMERA ANIMATION ---
let camTargetPos = new THREE.Vector3(0, 1, 5);
let camTargetLook = new THREE.Vector3(0, 0, 0);
let animating = false;

function animateCamera(pos, look, duration = 1.0) {
  const startPos = camera.position.clone();
  const startLook = controls.target.clone();
  const startTime = performance.now();
  animating = true;
  
  function step() {
    const elapsed = (performance.now() - startTime) / 1000;
    const t = Math.min(elapsed / duration, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    
    camera.position.lerpVectors(startPos, pos, ease);
    controls.target.lerpVectors(startLook, look, ease);
    
    if (t < 1) requestAnimationFrame(step);
    else animating = false;
  }
  step();
}

// --- SWITCHING ---
let currentId = 'lnp';

function showItem(id) {
  currentId = id;
  const item = items[id];
  
  // UI
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === id));
  document.getElementById('info-name').textContent = item.name;
  document.getElementById('info-size').textContent = item.size >= 1000 ? `~${(item.size/1000).toLocaleString()} µm` : `~${item.size} nm`;
  document.getElementById('info-ratio').textContent = item.ratio;
  document.getElementById('info-desc').textContent = item.desc;
  
  // Clear comparison
  while (compGroup.children.length) compGroup.remove(compGroup.children[0]);
  
  // LNP always stays centered at LNP_VISUAL_RADIUS
  lnpGroup.visible = true;
  
  if (id === 'lnp') {
    animateCamera(new THREE.Vector3(0, 1, 5), new THREE.Vector3(0, 0, 0));
    return;
  }
  
  // Scale: comparison item grows AROUND the LNP
  // ratio = how many times bigger the comparison is than LNP
  const ratio = item.size / 20;
  // Comparison visual radius in scene units
  const compRadius = LNP_VISUAL_RADIUS * ratio;
  
  // Clone and scale comparison model
  const model = compModels[id].clone(true);
  // Each model is built at ~unit radius (1), scale to compRadius
  model.scale.setScalar(compRadius);
  
  // Position: centered on same origin as LNP (LNP is inside/in-front)
  model.position.set(0, 0, 0);
  
  // For manageable ratios (≤5), show both overlapping — LNP visibly smaller inside
  // For larger ratios, we show a cross-section (cut the comparison so you can see inside)
  if (ratio <= 5) {
    // Both fully visible, comparison transparent enough to see LNP inside
    model.traverse(child => {
      if (child.isMesh && child.material) {
        child.material = child.material.clone();
        child.material.transparent = true;
        child.material.opacity = Math.min(child.material.opacity || 1, 0.35);
        child.material.depthWrite = false;
      }
    });
    compGroup.add(model);
    // Camera pulls back to see comparison
    const camDist = compRadius * 3;
    animateCamera(new THREE.Vector3(0, compRadius * 0.3, camDist), new THREE.Vector3(0, 0, 0));
  } else {
    // Large ratio: show comparison as a partial shell / cross-section
    // Clip the top hemisphere so you're looking "inside" and see LNP as a speck
    model.traverse(child => {
      if (child.isMesh && child.material) {
        child.material = child.material.clone();
        child.material.transparent = true;
        child.material.opacity = Math.min(child.material.opacity || 1, 0.25);
        child.material.side = THREE.DoubleSide;
        child.material.clippingPlanes = [new THREE.Plane(new THREE.Vector3(0, -1, 0), compRadius * 0.1)];
        child.material.clipShadows = true;
      }
    });
    renderer.localClippingEnabled = true;
    compGroup.add(model);
    
    // Camera: looking from slightly above, angled down to see LNP in center
    // Cap camera distance so it doesn't go insanely far
    const camDist = Math.min(compRadius * 2.5, 80);
    animateCamera(
      new THREE.Vector3(0, camDist * 0.4, camDist * 0.8),
      new THREE.Vector3(0, 0, 0),
      1.2
    );
  }
}

// --- EVENTS ---
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', () => showItem(card.dataset.id));
});

// --- ANIMATE ---
function animate() {
  requestAnimationFrame(animate);
  if (!animating) controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
